name = "har-portfolio"
compatibility_date = "2024-04-01"
pages_build_output_dir = "dist"

[vars]
NODE_VERSION = "20"

[[kv_namespaces]]
binding = "PORTFOLIO_DB"
id = "YOUR_KV_NAMESPACE_ID" # You must create this in Cloudflare Dashboard -> Workers & Pages -> KV

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
